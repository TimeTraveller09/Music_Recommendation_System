<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HarmonAI - Premium Music Discovery</title>
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Plus+Jakarta+Sans:wght@300;400;500;600;700&display=swap"
        rel="stylesheet">

    <link rel="stylesheet" href="/style.css">
</head>

<body>

    <!-- Ambient dynamic backdrop -->
    <div class="ambient-mesh">
        <div class="ambient-blob blob-emerald"></div>
        <div class="ambient-blob blob-gold"></div>
        <div class="ambient-blob blob-bronze"></div>
    </div>

    <header>
        <h1>HarmonAI</h1>
        <div class="subtitle">
            <span>Premium Music Discovery</span>
        </div>
    </header>

    <main>
        <section class="glass-card">
            <div class="search-container">
                <div class="search-title">
                    <svg xmlns="http://www.w3.org/2000/svg" width="22" height="22" viewBox="0 0 24 24" fill="none"
                        stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                        <circle cx="11" cy="11" r="8"></circle>
                        <line x1="21" y1="21" x2="16.65" y2="16.65"></line>
                    </svg>
                    Search Song Database
                </div>
                <div class="input-wrapper">
                    <input type="text" id="song-input" class="search-input" placeholder="Type song name or artist..."
                        autocomplete="off">
                    <svg class="search-icon" xmlns="http://www.w3.org/2000/svg" width="22" height="22"
                        viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round"
                        stroke-linejoin="round">
                        <path d="M9 18V5l12-2v13"></path>
                        <circle cx="6" cy="18" r="3"></circle>
                        <circle cx="18" cy="16" r="3"></circle>
                    </svg>

                    <div id="autocomplete-list" class="autocomplete-dropdown"></div>
                </div>

                <button id="btn-submit" class="btn-recommend" disabled>
                    <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none"
                        stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <polygon points="5 3 19 12 5 21 5 3"></polygon>
                    </svg>
                    Calculate Match Matrix
                </button>
            </div>
        </section>

        <!-- Loader -->
        <section id="loader" class="loader-container">
            <div class="spinner"></div>
            <p style="color: var(--text-muted); font-size: 0.95rem; font-weight: 500; letter-spacing: 0.2px;">
                Re-projecting high-dimensional feature vectors...</p>
        </section>

        <!-- Recommendations Results -->
        <section id="results" class="results-section">
            <div class="selected-song-banner">
                <div class="song-info-group">
                    <div class="music-pulse">
                        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                            stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <path d="M9 18V5l12-2v13"></path>
                            <circle cx="6" cy="18" r="3"></circle>
                            <circle cx="18" cy="16" r="3"></circle>
                        </svg>
                    </div>
                    <div>
                        <div class="banner-label">Seed Track</div>
                        <div id="seed-name" class="banner-title">Song Title</div>
                        <div id="seed-artist" class="banner-artist">by Artist</div>
                    </div>
                </div>
                <div id="seed-genre" class="genre-badge">Pop</div>
            </div>

            <h2 class="visualizer-title">
                <span><span style="color: var(--primary);">✦</span> Vector-Mapped Recommendations</span>
                <div class="equalizer" style="height: 14px;">
                    <div class="equalizer-bar" style="width: 2px;"></div>
                    <div class="equalizer-bar" style="width: 2px;"></div>
                    <div class="equalizer-bar" style="width: 2px;"></div>
                    <div class="equalizer-bar" style="width: 2px;"></div>
                </div>
            </h2>

            <div id="rec-list" class="rec-grid">
                <!-- Recommended cards inserted here dynamically -->
            </div>
        </section>
    </main>

    <!-- Error Toast -->
    <div id="error-toast" class="toast">
        <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none"
            stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
            <circle cx="12" cy="12" r="10"></circle>
            <line x1="12" y1="8" x2="12" y2="12"></line>
            <line x1="12" y1="16" x2="12.01" y2="16"></line>
        </svg>
        <span id="toast-message">An error occurred.</span>
    </div>

    <footer>
        <div>HarmonAI Engine &copy; 2026. Premium Vector Similarity Analytics.</div>
    </footer>

    <script src="/static/js/script.js" defer></script>
</body>

</html>
